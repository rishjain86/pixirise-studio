<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixiRise Studio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="logo">
                <h2>PixiRise <span class="neon-accent">Studio</span></h2>
            </div>
            <nav class="menu">
                <ul>
                    <li class="active">Bulk Resizer</li>
                    <li>Background Editor</li>
                    <li>Smart Watermark</li>
                    <li>OCR Extractor</li>
                </ul>
            </nav>
        </aside>

        <main class="workspace">
            <header class="topbar">
                <h1>Active Workspace</h1>
            </header>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <h3>Drag & Drop Images Here</h3>
                <p>or click to browse files</p>
                <input type="file" id="fileInput" multiple accept="image/*" hidden>
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Select Images</button>
            </div>

            <div class="preview-section">
                <h3>Queue (<span id="queueCount">0</span>)</h3>
                <div class="preview-grid" id="previewGrid">
                    </div>
            </div>
        </main>

        <aside class="settings-panel">
            <h3>Batch Settings</h3>
            
            <div class="setting-group">
                <label>Target Width (px)</label>
                <input type="number" id="targetWidth" value="349">
            </div>
            
            <div class="setting-group">
                <label>Target Height (px)</label>
                <input type="number" id="targetHeight" value="200">
            </div>

            <div class="setting-group">
                <label>Export Format</label>
                <select id="exportFormat">
                    <option value="image/webp">WebP (Recommended)</option>
                    <option value="image/jpeg">JPEG</option>
                    <option value="image/png">PNG</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Image Quality (%)</label>
                <input type="range" id="imageQuality" min="10" max="100" value="80">
                <span id="qualityValue">80%</span>
            </div>

            <button class="btn-action" id="processBtn">Process & Download .Zip</button>
        </aside>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
